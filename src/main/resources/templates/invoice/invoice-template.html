<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />

    <style>

        body{
            font-family: Arial, sans-serif;
            font-size: 12px;
            color:#333;
        }

        .container{
            width:100%;
        }

        h1{
            text-align:center;
        }

        table{
            width:100%;
            border-collapse: collapse;
            margin-top:10px;
        }

        th,td{
            border:1px solid #ccc;
            padding:6px;
        }

        th{
            background:#f5f5f5;
        }

        .text-right{
            text-align:right;
        }

        .summary{
            margin-top:20px;
            width:40%;
            float:right;
        }

        .summary td{
            border:none;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>MEME MUSIC BOX</h1>

    <h2>HÓA ĐƠN THANH TOÁN</h2>

    <p>
        <strong>Mã hóa đơn:</strong>
        <span th:text="${invoice.invoiceCode}"></span>
    </p>

    <p>
        <strong>Ngày lập:</strong>
<!--        <span th:text="${invoice.createdAt}"></span>-->
        <span
            th:text="${#temporals.format(
                invoice.createdAt,
                'dd/MM/yyyy HH:mm:ss'
            )}">
        </span>
    </p>

    <p>
        <strong>Hội viên:</strong>

        <span
                th:text="${invoice.memberAccount != null
                ? invoice.memberAccount.memberProfile.fullName
                : 'Khách lẻ'}">
        </span>
    </p>

    <p>
        <strong>Email:</strong>

        <span
                th:text="${invoice.memberAccount != null
                ? invoice.memberAccount.email
                : '-'}">
        </span>
    </p>

    <p>
        <strong>Nhân viên:</strong>

        <span
                th:text="${(invoice.createdByAccount.employeeProfile == null)? 'AD' : invoice.createdByAccount.employeeProfile.fullName}">
        </span>
    </p>

    <h3>Danh sách phòng</h3>

    <table>

        <thead>
        <tr>
            <th>Phòng</th>
            <th>Check In</th>
            <th>Check Out</th>
            <th>Số giờ</th>
            <th>Tiền phòng</th>
        </tr>
        </thead>

        <tbody>

        <tr
                th:each="roomInvoice : ${invoice.roomOfInvoices}">

            <td
                    th:text="${roomInvoice.room.roomNumber}">
            </td>

<!--            <td-->
<!--                    th:text="${roomInvoice.checkInAt}">-->
<!--            </td>-->

<!--            <td-->
<!--                    th:text="${roomInvoice.checkOutAt}">-->
<!--            </td>-->
            <td
                th:text="${#temporals.format(
                    roomInvoice.checkInAt,
                    'HH:mm:ss dd/MM/yyyy'
                )}">
            </td>

            <td
                th:text="${roomInvoice.checkOutAt != null
                    ? #temporals.format(
                        roomInvoice.checkOutAt,
                        'HH:mm:ss dd/MM/yyyy'
                      )
                    : '-'}">
            </td>

            <td
                    th:text="${roomInvoice.durationHours}">
            </td>

            <td
                    class="text-right"
                    th:text="${roomInvoice.roomCharge}">
            </td>

        </tr>

        </tbody>

    </table>

    <h3>Danh sách dịch vụ</h3>

    <table>

        <thead>
        <tr>
            <th>Sản phẩm</th>
            <th>SL</th>
            <th>Đơn giá</th>
            <th>Thành tiền</th>
        </tr>
        </thead>

        <tbody>

        <tr
                th:each="item : ${invoice.productOfInvoices}">

            <td
                    th:text="${item.product.productName}">
            </td>

            <td
                    th:text="${item.quantity}">
            </td>

            <td
                    th:text="${item.product.unitPrice}">
            </td>

            <td
                    th:text="${item.lineTotal}">
            </td>

        </tr>

        </tbody>

    </table>

    <table class="summary">

        <tr>
            <td>Tổng tiền phòng</td>
            <td class="text-right"
                th:text="${invoice.roomCharge}">
            </td>
        </tr>

        <tr>
            <td>Tổng tiền dịch vụ</td>
            <td class="text-right"
                th:text="${invoice.serviceCharge}">
            </td>
        </tr>

        <tr>
            <td>
                Giảm giá
                (<span th:text="${invoice.discountPercent}"></span>%)
            </td>

            <td class="text-right"
                th:text="${invoice.discountAmount}">
            </td>
        </tr>

        <tr>
            <td>
                VAT
                (<span th:text="${invoice.vatPercent}"></span>%)
            </td>

            <td class="text-right"
                th:text="${invoice.vatAmount}">
            </td>
        </tr>

        <tr>
            <td>
                <strong>Tổng thanh toán</strong>
            </td>

            <td class="text-right">
                <strong
                        th:text="${invoice.finalAmount}">
                </strong>
            </td>
        </tr>

    </table>

</div>

</body>
</html>
